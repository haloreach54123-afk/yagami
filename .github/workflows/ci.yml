name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  quality:
    name: fmt, lint, typecheck, build, pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package smoke
        run: |
          npm pack --dry-run
          npm pack --dry-run ./packages/pi-yagami-search
